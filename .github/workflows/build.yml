name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip project
        run: unzip salih_ahmad_app.zip
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
      - name: Get dependencies
        run: cd salih_app && flutter pub get
      - name: Build APK
        run: cd salih_app && flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: salih-ahmad-apk
          path: salih_app/build/app/outputs/flutter-apk/app-release.apk
